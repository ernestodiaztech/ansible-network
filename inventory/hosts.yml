---
# =============================================================
# Ansible Inventory — Enterprise Lab (Containerlab)
# Management Network: 172.16.0.0/24
# =============================================================

all:
  children:

    # =========================================================
    # CISCO IOS-XE — WAN Routers + Leaf Switches
    # CSR1000v (wan-r1, wan-r2) and Cat9Kv (leaf-01, leaf-02)
    # both run IOS-XE and use the same connection settings
    # =========================================================
    cisco_ios:
      children:
        wan_routers:
          hosts:
            wan-r1:
              ansible_host: 172.16.0.11
            wan-r2:
              ansible_host: 172.16.0.12
        leaf_switches:
          hosts:
            leaf-01:
              ansible_host: 172.16.0.23
            leaf-02:
              ansible_host: 172.16.0.24

    # =========================================================
    # CISCO NX-OS — Spine Switches only
    # =========================================================
    cisco_nxos:
      children:
        spine_switches:
          hosts:
            spine-01:
              ansible_host: 172.16.0.21
            spine-02:
              ansible_host: 172.16.0.22

    # =========================================================
    # PALO ALTO — Firewall
    # =========================================================
    paloalto:
      hosts:
        fw-01:
          ansible_host: 172.16.0.10

    # =========================================================
    # LINUX HOSTS
    # =========================================================
    linux_hosts:
      hosts:
        host-01:
          ansible_host: 172.16.0.31
        host-02:
          ansible_host: 172.16.0.32

    # =========================================================
    # LOGICAL GROUPINGS (cross-platform)
    # =========================================================
    wan:
      hosts:
        wan-r1:
        wan-r2:

    datacenter:
      children:
        spine_switches:
        leaf_switches:

    network_devices:
      children:
        cisco_ios:
        cisco_nxos:
        paloalto: